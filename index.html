<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北京海淀区天气预报</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- 顶部工具栏 -->
        <header class="header">
            <div class="location">
                <span class="icon">📍</span>
                <span class="location-text" data-zh="北京海淀区" data-en="Haidian District, Beijing">北京海淀区</span>
            </div>
            <div class="controls">
                <button class="btn theme-toggle" id="themeToggle" title="切换主题">
                    <span class="theme-icon">🌙</span>
                </button>
                <button class="btn lang-toggle" id="langToggle" title="切换语言">
                    <span class="lang-text">EN</span>
                </button>
            </div>
        </header>

        <!-- 主天气卡片 -->
        <div class="main-weather-card">
            <div class="current-info">
                <div class="update-time">
                    <span data-zh="更新于" data-en="Updated at">更新于</span>: <span id="updateTimeValue">--</span>
                </div>
                <div class="temperature-display">
                    <span class="temperature-value" id="temperature">--</span>
                    <span class="temperature-unit">℃</span>
                </div>
                <div class="weather-description">
                    <span class="weather-icon" id="weatherIcon">☀️</span>
                    <span id="weatherDesc" data-zh="晴" data-en="Sunny">晴</span>
                </div>
                <div class="wind-info">
                    <span data-zh="风速" data-en="Wind">风速</span>: <span id="windText">--</span>
                </div>
            </div>
            <div class="details-grid">
                <div class="detail-card">
                    <div class="detail-icon">🌡️</div>
                    <div class="detail-label" data-zh="气压" data-en="Pressure">气压</div>
                    <div class="detail-value" id="pressure">-- hPa</div>
                </div>
                <div class="detail-card">
                    <div class="detail-icon">💧</div>
                    <div class="detail-label" data-zh="湿度" data-en="Humidity">湿度</div>
                    <div class="detail-value" id="humidity">--%</div>
                </div>
                <div class="detail-card">
                    <div class="detail-icon">🌧️</div>
                    <div class="detail-label" data-zh="降水" data-en="Precipitation">降水</div>
                    <div class="detail-value" id="precipitation">-- mm</div>
                </div>
                <div class="detail-card">
                    <div class="detail-icon">🌡️</div>
                    <div class="detail-label" data-zh="体感温度" data-en="Feels Like">体感温度</div>
                    <div class="detail-value" id="feelsLike">--°C</div>
                </div>
            </div>
        </div>

        <!-- 温度曲线图 -->
        <div class="chart-section">
            <div class="chart-header">
                <div class="chart-title" data-zh="一周温度趋势" data-en="Weekly Temperature Trend">一周温度趋势</div>
                <div class="chart-legend">
                    <div class="legend-item">
                        <span class="legend-dot legend-high"></span>
                        <span data-zh="最高温" data-en="High">最高温</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-dot legend-low"></span>
                        <span data-zh="最低温" data-en="Low">最低温</span>
                    </div>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="tempChart"></canvas>
            </div>
        </div>

        <!-- 7天天气预报 -->
        <div class="forecast-section">
            <h3 class="section-title" data-zh="7天天气预报" data-en="7-Day Forecast">7天天气预报</h3>
            <div class="forecast-list" id="dayList">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 逐小时预报 -->
        <div class="hourly-section">
            <div class="hourly-header">
                <h3 class="section-title" data-zh="逐小时精细化预报" data-en="Hourly Forecast">逐小时精细化预报</h3>
                <div class="day-tabs" id="dayTabs">
                    <!-- 动态生成 -->
                </div>
            </div>
            <div class="hourly-table-container">
                <table class="hourly-table" id="hourlyTable">
                    <thead>
                        <tr>
                            <th data-zh="时间" data-en="Time">时间</th>
                            <th data-zh="天气" data-en="Weather">天气</th>
                            <th data-zh="气温" data-en="Temp">气温</th>
                            <th data-zh="降水" data-en="Precip">降水</th>
                            <th data-zh="风速" data-en="Wind">风速</th>
                            <th data-zh="风向" data-en="Wind Dir">风向</th>
                        </tr>
                    </thead>
                    <tbody id="hourlyTableBody">
                        <!-- 动态生成 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 数据来源 -->
        <footer class="footer">
            <p data-zh="数据来源：中国气象局 | 自动更新：每1小时" data-en="Data Source: China Meteorological Administration | Auto Update: Every Hour">数据来源：中国气象局 | 自动更新：每1小时</p>
        </footer>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
