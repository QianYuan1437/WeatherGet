name: Weather Data Update and Deploy

on:
  schedule:
    # 每小时执行一次
    - cron: '0 * * * *'
  workflow_dispatch:
    # 允许手动触发
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.generate-data.outputs.timestamp }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          fi

      - name: Fetch weather data
        id: fetch-weather
        run: |
          if node scripts/fetch-weather.js; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

      - name: Generate sample data if fetch fails
        if: steps.fetch-weather.outputs.status == 'failed'
        run: |
          mkdir -p data
          echo '{
            "updateTime": "'$(date -u +'%Y-%m-%dT%H:%M:%SZ')'",
            "generationTime": "'$(date -u +'%Y-%m-%dT%H:%M:%SZ')'",
            "location": "北京海淀区",
            "locationCode": "54399",
            "source": "China Meteorological Administration",
            "current": {
              "temp": "25",
              "feelsLike": "24",
              "weather": "晴",
              "humidity": "45",
              "windSpeed": "2.5",
              "pressure": "1013",
              "visibility": "15"
            },
            "hourly": [],
            "daily": []
          }' > data/weather.json

      - name: Generate timestamp
        id: generate-data
        run: echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Commit and push data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/weather.json
          git diff --staged --quiet || git commit -m "Update weather data $(date -u +'%Y-%m-%d %H:%M:%S')"
          git push

  deploy:
    needs: update-data
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4